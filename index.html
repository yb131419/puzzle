<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彥彬 🧩 拼圖系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --bg: #fdfcff;
            --bg2: #f5f7fa;
            --wall: #ffffff;
            --wall2: #f8f9fc;
            --border: #e6e9f0;
            --border2: #d3d9e3;

            --text: #374151;
            --text-dim: #6b7280;
            --text-bright: #1f2937;

            --accent: #4dabf7;
            --accent-gradient: linear-gradient(135deg, #4dabf7 0%, #3b82f6 100%);
            
            --green: #51cf66;
            --green-gradient: linear-gradient(135deg, #51cf66 0%, #10b981 100%);
            
            --yellow: #ffd43b;
            --yellow-gradient: linear-gradient(135deg, #ffd43b 0%, #f59e0b 100%);
            
            --red: #ff6b6b;
            --red-gradient: linear-gradient(135deg, #ff6b6b 0%, #ef4444 100%);
            
            --purple: #9775fa;
            --purple-gradient: linear-gradient(135deg, #9775fa 0%, #8b5cf6 100%);
            
            --gray: #868e96;
            --gray-gradient: linear-gradient(135deg, #868e96 0%, #495057 100%);

            --shadow-light: 0 2px 10px rgba(0, 0, 0, 0.06);
            --shadow-strong: 0 8px 25px rgba(0, 0, 0, 0.08);
            --shadow-button: 0 4px 12px rgba(0, 0, 0, 0.1);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            padding: 24px 14px 70px;
            font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
            color: var(--text);
            overflow-x: hidden;
        }

        .px-box {
            background: var(--wall);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-light);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .px-box:hover {
            box-shadow: var(--shadow-strong);
            transform: translateY(-1px);
        }

        .section-header {
            background: var(--wall2);
            padding: 14px 18px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 1.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border);
        }

        .section-header .dot {
            width: 8px; height: 8px;
            background: var(--accent);
            border-radius: 50%;
            flex-shrink: 0;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        .section-header .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        /* 按鈕特效超強化 */
        .px-btn {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.8px;
            border: none;
            padding: 12px 14px;
            cursor: pointer;
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-button);
            position: relative;
            overflow: hidden;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .px-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.6s ease;
        }

        .px-btn:hover:not(:disabled)::after {
            left: 100%;
        }

        .px-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            filter: brightness(1.1);
        }

        .px-btn:active:not(:disabled) {
            transform: translateY(0px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .px-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.8);
            transform: none;
            box-shadow: none;
        }

        .px-btn.blue   { background: var(--accent-gradient); }
        .px-btn.green  { background: var(--green-gradient); }
        .px-btn.yellow { background: var(--yellow-gradient); }
        .px-btn.red    { background: var(--red-gradient); }
        .px-btn.purple { background: var(--purple-gradient); }
        .px-btn.gray   { background: var(--gray-gradient); }

        .px-btn.w-full { width: 100%; }
        .px-btn.sm     { font-size: 12px; padding: 8px 12px; }
        .px-btn.lg     { font-size: 15px; padding: 14px 18px; }

        .max-w {
            max-width: 480px;
            margin: 0 auto;
        }

        .stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .row {
            display: flex;
            gap: 14px;
        }

        .col {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .center {
            justify-content: center;
            align-items: center;
        }

        .f1 { flex: 1; }
        .hidden { display: none !important; }

        /* 標題特效強化 */
        .title-area {
            text-align: center;
            padding: 20px 0 30px;
        }

        .main-title {
            font-size: 28px;
            font-weight: 900;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            text-shadow: 0 2px 10px rgba(77, 171, 247, 0.2);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { filter: brightness(1); }
            to { filter: brightness(1.15); }
        }

        .sub-title {
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 2px;
            margin-top: 8px;
            font-weight: 500;
        }

        .title-deco {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            justify-content: center;
        }

        .title-deco span {
            height: 2px;
            width: 80px;
            background: var(--accent-gradient);
            border-radius: 1px;
        }

        .title-deco .diamond {
            width: 10px; height: 10px;
            background: var(--accent-gradient);
            transform: rotate(45deg);
            box-shadow: 0 0 10px rgba(77, 171, 247, 0.4);
        }

        .member-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px 16px;
            padding: 18px;
            font-size: 14px;
        }

        .member-label {
            color: var(--text-dim);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .member-value {
            color: var(--text-bright);
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .text-diamond {
            background: var(--purple-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .text-gold {
            background: var(--yellow-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }
        .text-expire { color: var(--red); font-weight: 700; }
        .text-accent { color: var(--accent); font-weight: 700; }

        /* 進度條特效 */
        .px-progress {
            margin: 10px 18px 14px;
            height: 10px;
            background: var(--bg2);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);
        }
        .px-progress-fill {
            height: 100%;
            background: var(--green-gradient);
            transition: width 0.8s cubic-bezier(0.34, 1.36, 0.64, 1);
            border-radius: 20px;
            box-shadow: 0 0 10px rgba(81, 207, 102, 0.3);
        }

        .upload-half {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 14px;
            gap: 14px;
        }
        .upload-label-px {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 1px;
        }
        .upload-preview {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-light);
            transition: all 0.3s ease;
        }
        .upload-preview:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-strong);
        }
        .upload-divider {
            width: 1px;
            background: var(--border2);
            align-self: stretch;
        }

        .btn-group {
            padding: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn-group.col-2 > * { flex: 1; min-width: calc(50% - 6px); }
        .btn-group.col-3 > * { flex: 1; }

        .text-edit-grid {
            padding: 16px;
            display: grid;
            grid-template-columns: 1fr 1px 1fr;
        }
        .text-edit-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 0 12px;
        }
        .text-col-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-align: center;
        }
        .text-edit-divider { background: var(--border2); width: 1px; }

        .compare-area { padding: 18px; }
        .split-zoom-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-light);
            overflow: hidden;
        }
        .left-img-area, .right-img-area {
            position: absolute; top:0; width:50%; height:100%; overflow: hidden;
        }
        .left-img-area { left:0; }
        .right-img-area { right:0; }
        .split-img {
            position: absolute;
            top:50%; left:50%;
            transform: translate(-50%,-50%) scale(1);
            width:100%; height:100%;
            object-fit: cover;
        }
        .divider-line {
            position: absolute;
            left:50%; top:0;
            width:2px; height:100%;
            background: var(--accent);
            box-shadow: 0 0 10px rgba(77, 171, 247, 0.4);
            z-index:5;
        }

        /* 照片文字特效超強化 */
        .fixed-text {
            position: absolute;
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            text-align: center;
            z-index:10;
            bottom:16px;
            transform: translateX(-50%);
            text-shadow: 
                0 0 12px rgba(0,0,0,0.6),
                2px 2px 4px rgba(0,0,0,0.4);
            letter-spacing: 1.5px;
            -webkit-text-stroke: 0.5px rgba(0,0,0,0.3);
        }
        .fixed-text.left  { left:25%; }
        .fixed-text.right { left:75%; }

        .ai-result-area {
            padding: 18px;
            font-size:14px;
            line-height: 1.8;
            color: var(--text);
        }
        .ai-block {
            border-left: 4px solid;
            padding: 14px 16px;
            background: var(--bg2);
            border-radius: 0 8px 8px 0;
            box-shadow: var(--shadow-light);
        }
        .ai-block.left  { border-color: var(--accent); }
        .ai-block.right { border-color: var(--yellow); }
        .ai-block-title {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .ai-block.left  .ai-block-title { color: var(--accent); }
        .ai-block.right .ai-block-title { color: var(--yellow); }
        .ai-divider {
            height:1px;
            background: var(--border);
            margin: 14px 0;
        }

        /* 狀態標籤特效 */
        .status-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 3px 8px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .status-badge.processing {
            color: #fff;
            background: var(--yellow-gradient);
            animation: blink 1.2s infinite alternate;
        }
        .status-badge.done {
            color: #fff;
            background: var(--green-gradient);
        }
        .status-badge.idle {
            color: #fff;
            background: var(--gray-gradient);
        }
        @keyframes blink {
            from { opacity:1; }
            to { opacity:0.7; }
        }

        .tip {
            font-size: 11px;
            color: var(--text-dim);
            padding: 10px 18px 14px;
            font-weight: 500;
        }
        input[type=file] { display:none; }

        /* 讀取動畫特效 */
        .loading-overlay {
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index:9999;
            opacity:0;
            visibility: hidden;
            transition: all 0.3s ease;
        }
        .loading-overlay.show {
            opacity:1;
            visibility: visible;
        }
        .loading-modal {
            background: var(--wall);
            border: 1px solid var(--accent);
            padding: 40px 36px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-strong);
            text-align: center;
            min-width: 300px;
        }
        .loading-spinner {
            width:48px; height:48px;
            border: 3px solid var(--border);
            border-top: 3px solid var(--accent);
            border-radius:50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            font-size:13px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom:20px;
            animation: textPulse 1.5s infinite alternate;
        }
        @keyframes textPulse {
            from { opacity:1; }
            to { opacity:0.6; }
        }
        .loading-bar {
            height:8px;
            background: var(--bg2);
            border-radius:10px;
            overflow:hidden;
            margin-bottom:20px;
        }
        .loading-bar-fill {
            height:100%;
            background: var(--accent-gradient);
            width:0%;
            animation: load 3s linear infinite;
        }
        @keyframes load {
            0% { width:0%; }
            80% { width:90%; }
            100% { width:90%; }
        }
    </style>
</head>
<body>

<div class="max-w stack">
    <div class="title-area">
        <div class="main-title">🧩 彥彬 拼圖系統</div>
        <div class="sub-title">▸ AI 氣色 × 輪廓 智能解析系統 ◂</div>
        <div class="title-deco">
            <span></span>
            <div class="diamond"></div>
            <span></span>
        </div>
    </div>

    <div class="px-box">
        <div class="section-header">
            <span class="dot"></span>
            <span>01 ／ 會員資訊</span>
            <span class="line"></span>
            <span id="statusBadge" class="status-badge processing">LOADING</span>
        </div>
        <div class="member-grid">
            <span class="member-label">▸ 用戶名稱</span>
            <span class="member-value" id="userName">載入中</span>
            <span class="member-label">▸ 權限等級</span>
            <span class="member-value" id="userLevel">—</span>
            <span class="member-label">▸ 剩餘次數</span>
            <span class="member-value" id="userRemain">—</span>
        </div>
        <div class="px-progress" id="progressBar" style="display:none">
            <div class="px-progress-fill" id="progressFill" style="width:100%"></div>
        </div>
        <div id="skoolRenewSection" class="btn-group col-2 hidden">
            <button onclick="window.open('https://portaly.cc/yb131419/product/nOKeWIxw8bWZE9IS9DUB'); alert('付款後請截圖通知彥彬');" class="px-btn blue">💎 儲值 50 次</button>
            <button onclick="window.open('https://portaly.cc/yb131419/product/HkGnrsKBbPiNDv1mdHxD'); alert('付款後請截圖通知彥彬');" class="px-btn purple">🌟 儲值 100 次</button>
        </div>
    </div>

    <div class="px-box">
        <div class="section-header">
            <span class="dot"></span>
            <span>02 ／ 圖片上傳</span>
            <span class="line"></span>
        </div>
        <div class="row" style="padding:14px;">
            <div class="upload-half">
                <div class="upload-label-px">◀ 左側照片</div>
                <input type="file" id="leftImg" accept="image/*">
                <img id="leftPreview" class="upload-preview hidden" alt="左圖預覽">
                <button onclick="document.getElementById('leftImg').click()" class="px-btn blue w-full sm">📂 選擇圖片</button>
            </div>
            <div class="upload-divider"></div>
            <div class="upload-half">
                <div class="upload-label-px">右側照片 ▶</div>
                <input type="file" id="rightImg" accept="image/*">
                <img id="rightPreview" class="upload-preview hidden" alt="右圖預覽">
                <button onclick="document.getElementById('rightImg').click()" class="px-btn blue w-full sm">📂 選擇圖片</button>
            </div>
        </div>
    </div>

    <div class="px-box">
        <div class="section-header" style="color:var(--green);">
            <span class="dot" style="background:var(--green);"></span>
            <span>03 ／ 核心功能</span>
            <span class="line"></span>
        </div>
        <div class="btn-group col-3">
            <button id="mergeBtn" onclick="mergeImages()" class="px-btn green" disabled>🧩<br>自動拼圖</button>
            <button id="resetBtn" onclick="resetZoom()" class="px-btn yellow" disabled>🔄<br>還原拼圖</button>
            <button onclick="clearAll()" class="px-btn red">🗑<br>清除全部</button>
        </div>
    </div>

    <div class="px-box">
        <div class="section-header" style="color:var(--yellow);">
            <span class="dot" style="background:var(--yellow);"></span>
            <span>04 ／ 文字編輯</span>
            <span class="line"></span>
        </div>
        <div class="text-edit-grid">
            <div class="text-edit-col">
                <div class="text-col-label">◀ 左側照片</div>
                <button onclick="addTextLeft(getTaiwanDate())" class="px-btn blue sm">📅 加入日期</button>
                <button onclick="clearLeftText()" class="px-btn gray sm">🧹 清除文字</button>
            </div>
            <div class="text-edit-divider"></div>
            <div class="text-edit-col">
                <div class="text-col-label">右側照片 ▶</div>
                <button onclick="addTextRight('2小時')" class="px-btn yellow sm">⏱ 加入兩小時</button>
                <button onclick="addTextRight(getTaiwanDate())" class="px-btn blue sm">📅 加入日期</button>
                <button onclick="clearRightText()" class="px-btn gray sm">🧹 清除文字</button>
            </div>
        </div>
        <div class="tip">▸ 請先完成拼圖後再編輯文字</div>
    </div>

    <div class="px-box">
        <div class="section-header">
            <span class="dot"></span>
            <span>05 ／ 對比結果</span>
            <span class="line"></span>
        </div>
        <div class="compare-area">
            <div id="capture-target" class="split-zoom-container" style="display:none;">
                <div class="left-img-area" id="leftImgArea">
                    <img id="leftSplitImg" class="split-img">
                </div>
                <div class="right-img-area" id="rightImgArea">
                    <img id="rightSplitImg" class="split-img">
                </div>
                <div class="divider-line"></div>
                <div id="leftText" class="fixed-text left"></div>
                <div id="rightText" class="fixed-text right"></div>
            </div>
            <div id="comparePlaceholder" style="padding:40px;text-align:center;color:var(--text-dim);">
                ▸ 尚未產生拼圖 ◂
            </div>
        </div>
    </div>

    <div class="px-box">
        <div class="section-header" style="color:var(--purple);">
            <span class="dot" style="background:var(--purple);"></span>
            <span>06 ／ AI 智能分析</span>
            <span class="line"></span>
        </div>
        <div class="btn-group">
            <button id="analyzeBtn" onclick="analyzeBoth()" class="px-btn purple w-full" disabled>🤖 執行 AI 智能分析</button>
        </div>
        <div class="ai-result-area">
            <div id="aiResult" style="color:var(--text-dim);">
                ▸ 尚未執行分析...
            </div>
        </div>
    </div>

    <div class="px-box">
        <div class="section-header">
            <span class="dot"></span>
            <span>07 ／ 分享功能</span>
            <span class="line"></span>
        </div>
        <div class="btn-group col-2">
            <button id="shareImgBtn" onclick="shareOnlyImage()" class="px-btn blue" disabled>📤 分享拼圖</button>
            <button id="shareAiBtn" onclick="shareMergeWithAI()" class="px-btn purple" disabled>📋 分享＋AI點評</button>
        </div>
        <div class="tip">▸ 分享圖片將包含系統水印</div>
    </div>
</div>

<div id="loadingOverlay" class="loading-overlay">
    <div class="loading-modal">
        <div class="loading-spinner"></div>
        <div class="loading-text">AI 分析中，請稍候...</div>
        <div class="loading-bar"><div class="loading-bar-fill"></div></div>
        <button class="px-btn red sm" onclick="closeLoading()">✕ 取消分析</button>
    </div>
</div>

<script>
    let leftFile, rightFile;
    let leftFileInfo, rightFileInfo;
    let userPermission = { allow: false };
    let abortController = null;
    let isAnalyzing = false;
    let lineId = "未登入";
    let lineName = "未登入";

    const GAS_URL = "https://script.google.com/macros/s/AKfycbwLNwQ48QIVp7TWYdd_xy-NCFR9hD140yIxNbrtIPAtCSnhcL5kFpOUrEtRrRMBYfl9/exec";
    const LIFF_ID = "2007475335-p9Ah3X8Z";

    const $  = id => document.getElementById(id);
    const leftPreview       = $('leftPreview');
    const rightPreview      = $('rightPreview');
    const captureTarget     = $('capture-target');
    const leftSplitImg      = $('leftSplitImg');
    const rightSplitImg     = $('rightSplitImg');
    const leftImgArea       = $('leftImgArea');
    const rightImgArea      = $('rightImgArea');
    const leftText          = $('leftText');
    const rightText         = $('rightText');
    const aiResultEl        = $('aiResult');
    const analyzeBtn        = $('analyzeBtn');
    const mergeBtn          = $('mergeBtn');
    const resetBtn          = $('resetBtn');
    const shareImgBtn       = $('shareImgBtn');
    const shareAiBtn        = $('shareAiBtn');
    const loadingOverlay    = $('loadingOverlay');
    const skoolRenewSection = $('skoolRenewSection');
    const userNameEl        = $('userName');
    const userLevelEl       = $('userLevel');
    const userRemainEl      = $('userRemain');
    const statusBadge       = $('statusBadge');
    const comparePlaceholder= $('comparePlaceholder');

    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            lineId = profile.userId;
            lineName = profile.displayName;
            userNameEl.innerHTML = lineName;
            await fetchUserPermission();
        } catch (err) {
            console.error("LIFF 初始化失敗：", err);
            userNameEl.innerHTML = "登入失敗";
            statusBadge.textContent = "ERROR";
            statusBadge.className = "status-badge idle";
            disableAllFunction();
        }
    }

    async function fetchUserPermission() {
        try {
            const res = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ action:"getPermission", lineId, lineName })
            });
            const data = await res.json();
            userPermission = data.permission || { allow: false };
            const level = userPermission.level || "";
            const remain = userPermission.remainCount || 0;
            userPermission.allow = (level === "尊爵") || (level === "黃金" && remain > 0);
            updatePermissionUI();
            toggleFunctionStatus();
            toggleSkoolRenewBtn();
        } catch (e) {
            console.error("獲取權限失敗：", e);
            userLevelEl.textContent = "獲取失敗";
            userRemainEl.textContent = "請重新整理";
            statusBadge.textContent = "ERROR";
            statusBadge.className = "status-badge idle";
            userPermission.allow = false;
            disableAllFunction();
        }
    }

    function updatePermissionUI() {
        const level = userPermission.level || "";
        const remain = userPermission.remainCount || 0;

        if (level === "尊爵") {
            userLevelEl.textContent = "尊爵";
            userLevelEl.className = "member-value text-diamond";
            userRemainEl.textContent = "∞ 無限次數";
            userRemainEl.className = "member-value text-diamond";
            statusBadge.textContent = "DIAMOND";
            statusBadge.className = "status-badge done";
            $('progressBar').style.display = 'none';
        } else if (level === "黃金") {
            userLevelEl.textContent = "黃金";
            userLevelEl.className = "member-value text-gold";
            statusBadge.textContent = "GOLD";
            statusBadge.className = "status-badge done";
            if (remain <= 0) {
                userRemainEl.textContent = "次數已用完";
                userRemainEl.className = "member-value text-expire";
                statusBadge.textContent = "EMPTY";
                statusBadge.className = "status-badge idle";
            } else {
                userRemainEl.textContent = `剩餘 ${remain} 次`;
                userRemainEl.className = "member-value text-gold";
                const pct = Math.min(100, (remain / 100) * 100);
                $('progressBar').style.display = 'block';
                $('progressFill').style.width = pct + '%';
            }
        } else {
            userLevelEl.textContent = "無權限";
            userLevelEl.className = "member-value text-expire";
            userRemainEl.textContent = "請聯繫管理員儲值";
            userRemainEl.className = "member-value text-expire";
            statusBadge.textContent = "LOCKED";
            statusBadge.className = "status-badge idle";
            $('progressBar').style.display = 'none';
        }
    }

    function toggleSkoolRenewBtn() {
        const level = userPermission.level || "";
        if (level === "尊爵") {
            skoolRenewSection.classList.add('hidden');
        } else {
            skoolRenewSection.classList.remove('hidden');
        }
    }

    function toggleFunctionStatus() {
        const on = userPermission.allow;
        mergeBtn.disabled   = !on;
        resetBtn.disabled   = !on;
        analyzeBtn.disabled = !on;
        shareImgBtn.disabled= !on;
        shareAiBtn.disabled = !on;
    }

    function disableAllFunction() {
        mergeBtn.disabled   = true;
        resetBtn.disabled   = true;
        analyzeBtn.disabled = true;
        shareImgBtn.disabled= true;
        shareAiBtn.disabled = true;
    }

    $('leftImg').addEventListener('change', e => {
        const f = e.target.files[0];
        if (!f) return;
        leftFileInfo = { name: f.name, size: f.size };
        leftPreview.src = URL.createObjectURL(f);
        leftPreview.classList.remove('hidden');
    });

    $('rightImg').addEventListener('change', e => {
        const f = e.target.files[0];
        if (!f) return;
        rightFileInfo = { name: f.name, size: f.size };
        rightPreview.src = URL.createObjectURL(f);
        rightPreview.classList.remove('hidden');
    });

    function isSameImage() {
        if (!leftFileInfo || !rightFileInfo) return false;
        return leftFileInfo.name === rightFileInfo.name && leftFileInfo.size === rightFileInfo.size;
    }

    function mergeImages() {
        if (!userPermission.allow) { alert("❌ 次數已用完，無法使用自動拼圖！"); return; }
        if (!leftPreview.src || !rightPreview.src) return alert('請上傳兩張照片');
        if (isSameImage()) { alert('⚠️ 左右是同一張像片，無法拼圖！'); return; }
        leftSplitImg.src  = leftPreview.src;
        rightSplitImg.src = rightPreview.src;
        captureTarget.style.display = 'block';
        comparePlaceholder.style.display = 'none';
        leftText.textContent  = '';
        rightText.textContent = '';
        initControls();
    }

    function resetZoom() {
        if (!userPermission.allow) { alert("❌ 次數已用完，無法使用！"); return; }
        resetZoomState();
    }

    function addTextLeft(t) {
        if (captureTarget.style.display === 'none') return alert('請先產生拼圖');
        leftText.textContent = t;
    }

    function addTextRight(t) {
        if (captureTarget.style.display === 'none') return alert('請先產生拼圖');
        rightText.textContent = t;
    }

    function clearLeftText()  { leftText.textContent  = ''; }
    function clearRightText() { rightText.textContent = ''; }

    function getTaiwanDate() {
        const now = new Date();
        const y = now.getFullYear() - 1911;
        const m = String(now.getMonth()+1).padStart(2,'0');
        const d = String(now.getDate()).padStart(2,'0');
        return `${y}/${m}/${d}`;
    }

    const zoomState = {
        left:  { scale:1, offsetX:0, offsetY:0, isDragging:false, startDistance:0 },
        right: { scale:1, offsetX:0, offsetY:0, isDragging:false, startDistance:0 }
    };

    function resetZoomState() {
        zoomState.left  = { scale:1, offsetX:0, offsetY:0, isDragging:false, startDistance:0 };
        zoomState.right = { scale:1, offsetX:0, offsetY:0, isDragging:false, startDistance:0 };
        update();
    }

    function initControls() {
        resetZoomState();
        leftImgArea.addEventListener('wheel',  e => { e.preventDefault(); zoomWheel(e,'left');  }, { passive:false });
        rightImgArea.addEventListener('wheel', e => { e.preventDefault(); zoomWheel(e,'right'); }, { passive:false });
        leftImgArea.addEventListener('touchstart', dragStart);
        leftImgArea.addEventListener('touchmove',  dragMove);
        leftImgArea.addEventListener('touchend',   dragEnd);
        rightImgArea.addEventListener('touchstart', dragStart);
        rightImgArea.addEventListener('touchmove',  dragMove);
        rightImgArea.addEventListener('touchend',   dragEnd);
        document.addEventListener('mouseup', dragEnd);
    }

    function dragStart(e) {
        e.preventDefault();
        const isLeft = e.target.closest('#leftImgArea');
        const a = isLeft ? 'left' : 'right';
        const rect = (isLeft ? leftImgArea : rightImgArea).getBoundingClientRect();
        if (e.touches && e.touches.length === 2) {
            const [t1, t2] = e.touches;
            zoomState[a].startDistance = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
            zoomState[a].isDragging = false;
        } else if (e.touches && e.touches.length === 1) {
            const t = e.touches[0];
            zoomState[a].isDragging = true;
            zoomState[a].startX = t.clientX - rect.left - zoomState[a].offsetX;
            zoomState[a].startY = t.clientY - rect.top  - zoomState[a].offsetY;
        }
    }

    function dragMove(e) {
        e.preventDefault();
        const isLeft = e.target.closest('#leftImgArea');
        const a = isLeft ? 'left' : 'right';
        const rect = (isLeft ? leftImgArea : rightImgArea).getBoundingClientRect();
        if (e.touches && e.touches.length === 2) {
            const [t1, t2] = e.touches;
            const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
            zoomState[a].scale = Math.min(4, Math.max(0.8, zoomState[a].scale * (dist / zoomState[a].startDistance)));
            zoomState[a].startDistance = dist;
            update();
        } else if (e.touches && e.touches.length === 1 && zoomState[a].isDragging) {
            const t = e.touches[0];
            zoomState[a].offsetX = t.clientX - rect.left - zoomState[a].startX;
            zoomState[a].offsetY = t.clientY - rect.top  - zoomState[a].startY;
            update();
        }
    }

    function dragEnd() {
        zoomState.left.isDragging = false;
        zoomState.right.isDragging = false;
    }

    function zoomWheel(e, a) {
        const delta = e.deltaY > 0 ? -0.08 : 0.08;
        zoomState[a].scale = Math.min(4, Math.max(0.8, zoomState[a].scale + delta));
        update();
    }

    function update() {
        leftSplitImg.style.transform  = `translate(-50%,-50%) translate(${zoomState.left.offsetX}px,${zoomState.left.offsetY}px) scale(${zoomState.left.scale})`;
        rightSplitImg.style.transform = `translate(-50%,-50%) translate(${zoomState.right.offsetX}px,${zoomState.right.offsetY}px) scale(${zoomState.right.scale})`;
    }

    function showLoading() { loadingOverlay.classList.add('show'); }
    function hideLoading()  { loadingOverlay.classList.remove('show'); isAnalyzing = false; }
    function closeLoading() {
        if (abortController) abortController.abort();
        hideLoading();
        analyzeBtn.disabled = !userPermission.allow;
        aiResultEl.innerHTML = '<span style="color:var(--yellow)">⚠️ 已手動停止 AI 分析</span>';
    }

    async function analyzeBoth() {
        if (!userPermission.allow) { alert("❌ 次數已用完，無法使用AI分析！"); return; }
        if (captureTarget.style.display === 'none') { alert('請先產生拼圖'); return; }
        if (isSameImage()) { alert('⚠️ 這是同一張像片，AI不點評！'); return; }
        if (isAnalyzing) { alert('AI正在分析中，請勿重複點擊'); return; }

        isAnalyzing = true;
        analyzeBtn.disabled = true;
        aiResultEl.innerHTML = '▸ AI 分析中...';
        abortController = new AbortController();
        showLoading();

        try {
            const imageData = await capture();
            const res = await fetch(GAS_URL, {
                method: 'POST',
                signal: abortController.signal,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ action:"analyze", image:imageData, lineId, lineName })
            });
            const data = await res.json();
            const result = data.result || "左圖：圖片分析失敗，請重新嘗試｜右圖：右圖評語";
            const [leftResult, rightResult] = result.split("｜");

            aiResultEl.innerHTML = `
<div class="ai-block left">
  <div class="ai-block-title">▸ 左圖 ／ 狀態評語</div>
  ${(leftResult || "").replace("左圖：","").trim() || "分析失敗，請重新嘗試"}
</div>
<div class="ai-divider"></div>
<div class="ai-block right">
  <div class="ai-block-title">▸ 右圖 ／ 狀態評語</div>
  ${(rightResult || "").replace("右圖：","").trim() || "右圖評語"}
</div>`;

            await fetchUserPermission();

        } catch (error) {
            if (error.name !== 'AbortError') {
                aiResultEl.innerHTML = `
<div class="ai-block left">
  <div class="ai-block-title">▸ 左圖 ／ 狀態評語</div>
  分析失敗，請重新嘗試
</div>
<div class="ai-divider"></div>
<div class="ai-block right">
  <div class="ai-block-title">▸ 右圖 ／ 狀態評語</div>
  右圖評語
</div>`;
                analyzeBtn.disabled = !userPermission.allow;
            }
        } finally {
            hideLoading();
        }
    }

    async function capture() {
        const c = await html2canvas(captureTarget, { scale:2, useCORS:true, backgroundColor:'#ffffff' });
        return c.toDataURL('image/png');
    }

    async function shareOnlyImage() {
        if (!userPermission.allow) { alert("❌ 次數已用完，無法使用分享！"); return; }
        if (captureTarget.style.display === 'none') return alert('請先產生拼圖');

        fetch(GAS_URL, {
            method: "POST",
            body: new URLSearchParams({ action:"log_share_image", lineId, lineName })
        });

        const url = await capture();
        const blob = await fetch(url).then(r => r.blob());
        const file = new File([blob], '拼圖結果.png', { type:'image/png' });
        if (navigator.share) {
            await navigator.share({ files:[file] });
        } else {
            alert('❌ 裝置不支援分享功能');
        }
    }

    async function shareMergeWithAI() {
        if (!userPermission.allow) { alert("❌ 次數已用完，無法使用分享！"); return; }
        if (captureTarget.style.display === 'none') return alert('請先產生拼圖');
        if (aiResultEl.innerText.includes('尚未') || aiResultEl.innerText.includes('分析中')) {
            alert('請先執行AI點評分析'); return;
        }

        fetch(GAS_URL, {
            method: "POST",
            body: new URLSearchParams({ action:"log_share_ai", lineId, lineName })
        });

        const mergeContainer = document.createElement('div');
        mergeContainer.id = 'merge-container';
        mergeContainer.style.cssText = 'width:100%;background:#ffffff;padding:16px;font-family:sans-serif;';

        mergeContainer.appendChild(captureTarget.cloneNode(true));

        const watermark = document.createElement('div');
        watermark.textContent = '彥彬 🧩 拼圖系統';
        watermark.style.cssText = 'text-align:center;padding:10px 0;font-size:14px;font-weight:700;color:#4dabf7;letter-spacing:2px;border-top:1px solid #e6e9f0;margin-top:10px;';
        mergeContainer.appendChild(watermark);

        const aiClone = aiResultEl.cloneNode(true);
        aiClone.style.cssText = 'margin-top:10px;background:#f5f7fa;padding:14px;border:1px solid #e6e9f0;font-size:14px;';
        mergeContainer.appendChild(aiClone);
        document.body.appendChild(mergeContainer);

        try {
            const canvas = await html2canvas(mergeContainer, { scale:2, useCORS:true, backgroundColor:'#ffffff' });
            const url = canvas.toDataURL('image/png');
            const blob = await fetch(url).then(r => r.blob());
            const file = new File([blob], '拼圖+AI點評.png', { type:'image/png' });
            if (navigator.share) {
                await navigator.share({ files:[file] });
            } else {
                alert('❌ 裝置不支援分享功能');
            }
        } finally {
            document.body.removeChild(mergeContainer);
        }
    }

    function clearAll() {
        analyzeBtn.disabled = !userPermission.allow;
        location.reload();
    }

    window.onload = function() { initLiff(); };
</script>

</body>
</html>
