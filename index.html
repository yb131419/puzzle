    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: var(--bg);
        background-image:
            repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(42,74,110,0.15) 31px, rgba(42,74,110,0.15) 32px),
            repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(42,74,110,0.15) 31px, rgba(42,74,110,0.15) 32px);
        min-height: 100vh;
        padding: 16px 12px 40px;
        font-family: var(--pixel-font);
        color: var(--text);
        image-rendering: pixelated;
    }

    /* ══════════════════════════════════════
       🧱 PIXEL BOX — 核心容器
    ══════════════════════════════════════ */
    .px-box {
        background: var(--wall);
        border: 2px solid var(--border);
        position: relative;
        image-rendering: pixelated;
    }
    /* 四角像素點裝飾 */
    .px-box::before, .px-box::after {
        content: '';
        position: absolute;
        width: 4px; height: 4px;
        background: var(--border);
    }
    .px-box::before { top: -2px; left: -2px; }
    .px-box::after  { top: -2px; right: -2px; }
    .px-box .corner-bl, .px-box .corner-br {
        position: absolute;
        width: 4px; height: 4px;
        background: var(--border);
    }
    .px-box .corner-bl { bottom: -2px; left: -2px; }
    .px-box .corner-br { bottom: -2px; right: -2px; }

    /* 顏色變體 */
    .px-box.accent  { border-color: var(--accent);  }
    .px-box.green   { border-color: var(--green);   }
    .px-box.yellow  { border-color: var(--yellow);  }
    .px-box.red     { border-color: var(--red);     }
    .px-box.purple  { border-color: var(--purple);  }

    /* ══════════════════════════════════════
       📋 SECTION HEADER — 區塊標題
    ══════════════════════════════════════ */
    .section-header {
        background: var(--wall2);
        border-bottom: 2px solid var(--border);
        padding: 7px 12px;
        font-size: 11px;
        color: var(--accent);
        letter-spacing: 2px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .section-header .dot {
        width: 7px; height: 7px;
        background: var(--accent);
        display: inline-block;
        flex-shrink: 0;
    }
    .section-header .line {
        flex: 1;
        height: 1px;
        background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ══════════════════════════════════════
       🔘 PIXEL BUTTONS — 像素按鈕
    ══════════════════════════════════════ */
    .px-btn {
        font-family: var(--pixel-font);
        font-size: 12px;
        font-weight: bold;
        letter-spacing: 1px;
        border: 2px solid;
        padding: 9px 12px;
        cursor: pointer;
        color: var(--text-bright);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        position: relative;
        transition: filter 0.1s, transform 0.1s;
        white-space: nowrap;
        image-rendering: pixelated;
        /* 立體底部陰影 */
        box-shadow: 0 4px 0 0 rgba(0,0,0,0.5), 0 5px 0 0 rgba(0,0,0,0.3);
        text-decoration: none;
        user-select: none;
    }
    .px-btn:hover:not(:disabled) {
        filter: brightness(1.25);
        transform: translateY(-2px);
        box-shadow: 0 6px 0 0 rgba(0,0,0,0.5), 0 7px 0 0 rgba(0,0,0,0.3);
    }
    .px-btn:active:not(:disabled) {
        transform: translateY(3px);
        box-shadow: 0 1px 0 0 rgba(0,0,0,0.5);
    }
    .px-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        filter: grayscale(0.6);
        transform: none;
        box-shadow: none;
    }
    /* 按鈕顏色 */
    .px-btn.blue   { background: var(--accent2); border-color: var(--accent); }
    .px-btn.green  { background: var(--green2);  border-color: var(--green);  }
    .px-btn.yellow { background: var(--yellow2); border-color: var(--yellow); }
    .px-btn.red    { background: var(--red2);    border-color: var(--red);    }
    .px-btn.purple { background: var(--purple2); border-color: var(--purple); }
    .px-btn.gray   { background: var(--gray2);   border-color: var(--gray);   }
    .px-btn.w-full { width: 100%; }
    .px-btn.sm     { font-size: 10px; padding: 7px 10px; }
    .px-btn.lg     { font-size: 13px; padding: 12px 16px; }

    /* ══════════════════════════════════════
       📐 LAYOUT
    ══════════════════════════════════════ */
    .max-w {
        max-width: 480px;
        margin: 0 auto;
    }
    .stack { display: flex; flex-direction: column; gap: 14px; }
    .row   { display: flex; gap: 10px; }
    .col   { display: flex; flex-direction: column; gap: 8px; }
    .center { justify-content: center; align-items: center; }
    .f1 { flex: 1; }
    .hidden { display: none !important; }

    /* ══════════════════════════════════════
       🎯 TITLE — 標題區
    ══════════════════════════════════════ */
    .title-area {
        text-align: center;
        padding: 20px 0 12px;
    }
    .main-title {
        font-size: 22px;
        font-weight: 900;
        color: var(--accent);
        letter-spacing: 3px;
        text-transform: uppercase;
        text-shadow: 0 0 20px rgba(79,195,247,0.5), 2px 2px 0 rgba(0,0,0,0.8);
        animation: title-glow 3s ease-in-out infinite;
    }
    @keyframes title-glow {
        0%,100% { text-shadow: 0 0 10px rgba(79,195,247,0.4), 2px 2px 0 #000; }
        50%      { text-shadow: 0 0 25px rgba(79,195,247,0.8), 0 0 40px rgba(79,195,247,0.3), 2px 2px 0 #000; }
    }
    .sub-title {
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 2px;
        margin-top: 6px;
    }
    /* 像素裝飾線 */
    .title-deco {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        justify-content: center;
    }
    .title-deco span {
        height: 2px;
        width: 60px;
        background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .title-deco .diamond {
        width: 8px; height: 8px;
        background: var(--accent);
        transform: rotate(45deg);
    }

    /* ══════════════════════════════════════
       👤 MEMBER CARD — 會員卡
    ══════════════════════════════════════ */
    .member-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 4px 12px;
        padding: 12px 14px;
        font-size: 11px;
    }
    .member-label { color: var(--text-dim); letter-spacing: 1px; }
    .member-value { color: var(--text-bright); font-weight: bold; }
    .text-diamond { color: var(--diamond); }
    .text-gold    { color: var(--gold); }
    .text-expire  { color: var(--red); }
    .text-accent  { color: var(--accent); }

    /* 像素進度條 */
    .px-progress {
        margin: 6px 14px 10px;
        height: 8px;
        background: var(--bg2);
        border: 1px solid var(--border2);
        position: relative;
        overflow: hidden;
    }
    .px-progress-fill {
        height: 100%;
        background: repeating-linear-gradient(
            90deg,
            var(--green) 0px, var(--green) 6px,
            var(--green2) 6px, var(--green2) 8px
        );
        transition: width 0.5s steps(10);
    }

    /* ══════════════════════════════════════
       🖼️ UPLOAD AREA — 上傳區
    ══════════════════════════════════════ */
    .upload-half {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 14px 10px;
        gap: 10px;
    }
    .upload-label-px {
        font-size: 10px;
        letter-spacing: 2px;
        color: var(--text-dim);
        text-align: center;
    }
    .upload-preview {
        width: 100%;
        aspect-ratio: 1/1;
        object-fit: cover;
        border: 2px solid var(--border);
        display: block;
    }
    .upload-divider {
        width: 2px;
        background: var(--border2);
        margin: 0;
        align-self: stretch;
    }

    /* ══════════════════════════════════════
       🔧 FUNCTION BUTTONS — 功能按鈕群
    ══════════════════════════════════════ */
    .btn-group {
        padding: 12px 14px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }
    .btn-group.col-2 > * { flex: 1; min-width: calc(50% - 4px); }
    .btn-group.col-3 > * { flex: 1; }

    /* ══════════════════════════════════════
       ✏️ TEXT EDIT — 文字編輯區
    ══════════════════════════════════════ */
    .text-edit-grid {
        padding: 12px 14px;
        display: grid;
        grid-template-columns: 1fr 2px 1fr;
        gap: 0;
    }
    .text-edit-col {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 0 10px;
    }
    .text-edit-col:first-child { padding-left: 0; }
    .text-edit-col:last-child  { padding-right: 0; }
    .text-col-label {
        font-size: 9px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-align: center;
        margin-bottom: 2px;
    }
    .text-edit-divider {
        background: var(--border2);
        width: 2px;
    }

    /* ══════════════════════════════════════
       🖼️ SPLIT COMPARE — 對比預覽
    ══════════════════════════════════════ */
    .compare-area {
        padding: 12px;
    }
    .split-zoom-container {
        position: relative;
        overflow: hidden;
        width: 100%;
        aspect-ratio: 1/1;
        touch-action: none;
        background: var(--bg2);
        border: 2px solid var(--border);
    }
    .left-img-area, .right-img-area {
        position: absolute;
        top: 0;
        width: 50%;
        height: 100%;
        overflow: hidden;
        cursor: zoom-in;
    }
    .left-img-area { left: 0; }
    .right-img-area { right: 0; }
    .split-img {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100%;
        height: 100%;
        transform-origin: center center;
        transform: translate(-50%, -50%) scale(1);
        object-fit: cover;
    }
    .divider-line {
        position: absolute;
        top: 0;
        left: 50%;
        width: 3px;
        height: 100%;
        background: rgba(79,195,247,0.7);
        box-shadow: 0 0 6px rgba(79,195,247,0.5);
        z-index: 5;
        transform: translateX(-50%);
    }
    .fixed-text {
        position: absolute;
        font-size: 22px;
        font-weight: 900;
        font-family: var(--pixel-font);
        color: #ffffff;
        text-align: center;
        pointer-events: none;
        z-index: 10;
        bottom: 10px;
        transform: translateX(-50%);
        text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
        letter-spacing: 1px;
    }
    .fixed-text.left  { left: 25%; }
    .fixed-text.right { left: 75%; }

    /* ══════════════════════════════════════
       🤖 AI RESULT — AI 點評結果
    ══════════════════════════════════════ */
    .ai-result-area {
        padding: 12px 14px;
        font-size: 12px;
        line-height: 1.9;
        color: var(--text-dim);
        min-height: 80px;
    }
    .ai-block {
        border-left: 3px solid;
        padding: 10px 12px;
        margin-bottom: 10px;
        background: rgba(0,0,0,0.2);
        font-size: 11px;
        line-height: 1.85;
    }
    .ai-block.left  { border-color: var(--accent); }
    .ai-block.right { border-color: var(--yellow); }
    .ai-block-title {
        font-size: 10px;
        font-weight: bold;
        letter-spacing: 2px;
        margin-bottom: 6px;
    }
    .ai-block.left  .ai-block-title { color: var(--accent); }
    .ai-block.right .ai-block-title { color: var(--yellow); }
    .ai-divider {
        height: 1px;
        background: var(--border2);
        margin: 10px 0;
    }

    /* ══════════════════════════════════════
       ⚡ LOADING OVERLAY — 載入浮窗
    ══════════════════════════════════════ */
    .loading-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.75);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s;
    }
    .loading-overlay.show {
        opacity: 1;
        visibility: visible;
    }
    .loading-modal {
        background: var(--wall);
        border: 2px solid var(--accent);
        padding: 32px 28px;
        text-align: center;
        min-width: 260px;
        position: relative;
    }
    /* 掃描線動畫 */
    .loading-modal::after {
        content: '';
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 3px;
        background: var(--accent);
        opacity: 0.7;
        animation: scan 2s linear infinite;
    }
    @keyframes scan {
        0%   { top: 0; }
        100% { top: 100%; }
    }
    .loading-spinner {
        width: 40px; height: 40px;
        border: 3px solid var(--border);
        border-top: 3px solid var(--accent);
        border-radius: 0;
        animation: px-spin 0.8s steps(8) infinite;
        margin: 0 auto 16px;
    }
    @keyframes px-spin {
        to { transform: rotate(360deg); }
    }
    .loading-text {
        font-size: 11px;
        letter-spacing: 2px;
        color: var(--accent);
        margin-bottom: 20px;
        animation: blink-text 1s step-end infinite;
    }
    @keyframes blink-text {
        50% { opacity: 0.3; }
    }
    .loading-bar {
        height: 6px;
        background: var(--bg2);
        border: 1px solid var(--border);
        margin-bottom: 20px;
        overflow: hidden;
    }
    .loading-bar-fill {
        height: 100%;
        background: var(--accent);
        width: 0%;
        animation: load-bar 3s linear infinite;
    }
    @keyframes load-bar {
        0%   { width: 0%; }
        80%  { width: 90%; }
        100% { width: 90%; }
    }

    /* ══════════════════════════════════════
       🌟 STATUS BADGE — 狀態徽章
    ══════════════════════════════════════ */
    .status-badge {
        display: inline-block;
        font-size: 9px;
        letter-spacing: 1px;
        padding: 2px 7px;
        border: 1px solid;
    }
    .status-badge.processing { color: var(--yellow); border-color: var(--yellow); background: rgba(245,166,35,0.1); animation: blink-text 0.8s step-end infinite; }
    .status-badge.done       { color: var(--green);  border-color: var(--green);  background: rgba(76,175,110,0.1); }
    .status-badge.idle       { color: var(--gray);   border-color: var(--gray);   background: rgba(74,96,112,0.1); }

    /* ══════════════════════════════════════
       💡 MISC
    ══════════════════════════════════════ */
    .pad { padding: 12px 14px; }
    .tip {
        font-size: 9px;
        color: var(--text-dim);
        letter-spacing: 1px;
        padding: 6px 14px;
    }
    input[type=file] { display: none; }

    /* 像素閃爍游標 */
    .cursor::after {
        content: '█';
        animation: blink-text 0.8s step-end infinite;
        color: var(--accent);
    }
</style>

<!-- ════════════════════════════════════════
     JavaScript — 全功能邏輯（完整保留原版）
════════════════════════════════════════ -->

<script>
    /* ── 全域變數 ── */
    let leftFile, rightFile;
    let leftFileInfo, rightFileInfo;
    let userPermission = { allow: false };
    let abortController = null;
    let isAnalyzing = false;
    let lineId = "未登入";
    let lineName = "未登入";

    const GAS_URL = "https://script.google.com/macros/s/AKfycbwLNwQ48QIVp7TWYdd_xy-NCFR9hD140yIxNbrtIPAtCSnhcL5kFpOUrEtRrRMBYfl9/exec";
    const LIFF_ID = "2007475335-p9Ah3X8Z";

    /* ── DOM refs ── */
    const $  = id => document.getElementById(id);
    const leftPreview       = $('leftPreview');
    const rightPreview      = $('rightPreview');
    const captureTarget     = $('capture-target');
    const leftSplitImg      = $('leftSplitImg');
    const rightSplitImg     = $('rightSplitImg');
    const leftImgArea       = $('leftImgArea');
    const rightImgArea      = $('rightImgArea');
    const leftText          = $('leftText');
    const rightText         = $('rightText');
    const aiResultEl        = $('aiResult');
    const analyzeBtn        = $('analyzeBtn');
    const mergeBtn          = $('mergeBtn');
    const resetBtn          = $('resetBtn');
    const shareImgBtn       = $('shareImgBtn');
    const shareAiBtn        = $('shareAiBtn');
    const loadingOverlay    = $('loadingOverlay');
    const skoolRenewSection = $('skoolRenewSection');
    const userNameEl        = $('userName');
    const userLevelEl       = $('userLevel');
    const userRemainEl      = $('userRemain');
    const statusBadge       = $('statusBadge');
    const comparePlaceholder= $('comparePlaceholder');

    /* ══════════════════════════════════════
       LIFF 登錄 + 權限
    ══════════════════════════════════════ */
    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            lineId = profile.userId;
            lineName = profile.displayName;
            userNameEl.innerHTML = lineName;
            await fetchUserPermission();
        } catch (err) {
            console.error("LIFF 初始化失敗：", err);
            userNameEl.innerHTML = "登入失敗";
            statusBadge.textContent = "ERROR";
            statusBadge.className = "status-badge idle";
            disableAllFunction();
        }
    }

    async function fetchUserPermission() {
        try {
            const res = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ action:"getPermission", lineId, lineName })
            });
            const data = await res.json();
            userPermission = data.permission || { allow: false };
            const level = userPermission.level || "";
            const remain = userPermission.remainCount || 0;
            userPermission.allow = (level === "尊爵") || (level === "黃金" && remain > 0);
            updatePermissionUI();
            toggleFunctionStatus();
            toggleSkoolRenewBtn();
        } catch (e) {
            console.error("獲取權限失敗：", e);
            userLevelEl.textContent = "獲取失敗";
            userRemainEl.textContent = "請重新整理";
            statusBadge.textContent = "ERROR";
            statusBadge.className = "status-badge idle";
            userPermission.allow = false;
            disableAllFunction();
        }
    }

    function updatePermissionUI() {
        const level = userPermission.level || "";
        const remain = userPermission.remainCount || 0;

        if (level === "尊爵") {
            userLevelEl.textContent = "尊爵";
            userLevelEl.className = "member-value text-diamond";
            userRemainEl.textContent = "∞ 無限次數";
            userRemainEl.className = "member-value text-diamond";
            statusBadge.textContent = "DIAMOND";
            statusBadge.className = "status-badge done";
            $('progressBar').style.display = 'none';
        } else if (level === "黃金") {
            userLevelEl.textContent = "黃金";
            userLevelEl.className = "member-value text-gold";
            statusBadge.textContent = "GOLD";
            statusBadge.className = "status-badge done";
            if (remain <= 0) {
                userRemainEl.textContent = "次數已用完";
                userRemainEl.className = "member-value text-expire";
                statusBadge.textContent = "EMPTY";
                statusBadge.className = "status-badge idle";
            } else {
                userRemainEl.textContent = `剩餘 ${remain} 次`;
                userRemainEl.className = "member-value text-gold";
                // 進度條（假設最大100次）
                const pct = Math.min(100, (remain / 100) * 100);
                $('progressBar').style.display = 'block';
                $('progressFill').style.width = pct + '%';
            }
        } else {
            userLevelEl.textContent = "無權限";
            userLevelEl.className = "member-value text-expire";
            userRemainEl.textContent = "請聯繫管理員儲值";
            userRemainEl.className = "member-value text-expire";
            statusBadge.textContent = "LOCKED";
            statusBadge.className = "status-badge idle";
            $('progressBar').style.display = 'none';
        }
    }

    function toggleSkoolRenewBtn() {
        const level = userPermission.level || "";
        if (level === "尊爵") {
            skoolRenewSection.classList.add('hidden');
        } else {
            skoolRenewSection.classList.remove('hidden');
        }
    }

    function toggleFunctionStatus() {
        const on = userPermission.allow;
        mergeBtn.disabled   = !on;
        resetBtn.disabled   = !on;
        analyzeBtn.disabled = !on;
        shareImgBtn.disabled= !on;
        shareAiBtn.disabled = !on;
    }

    function disableAllFunction() {
        mergeBtn.disabled   = true;
        resetBtn.disabled   = true;
        analyzeBtn.disabled = true;
        shareImgBtn.disabled= true;
        shareAiBtn.disabled = true;
    }

    /* ══════════════════════════════════════
       圖片上傳監聽
    ══════════════════════════════════════ */
    $('leftImg').addEventListener('change', e => {
        const f = e.target.files[0];
        if (!f) return;
        leftFileInfo = { name: f.name, size: f.size };
        leftPreview.src = URL.createObjectURL(f);
        leftPreview.classList.remove('hidden');
    });
    $('rightImg').addEventListener('change', e => {
        const f = e.target.files[0];
        if (!f) return;
        rightFileInfo = { name: f.name, size: f.size };
        rightPreview.src = URL.createObjectURL(f);
        rightPreview.classList.remove('hidden');
    });

    /* ══════════════════════════════════════
       核心功能
    ══════════════════════════════════════ */
    function isSameImage() {
        if (!leftFileInfo || !rightFileInfo) return false;
        return leftFileInfo.name === rightFileInfo.name && leftFileInfo.size === rightFileInfo.size;
    }

    function mergeImages() {
        if (!userPermission.allow) { alert("❌ 次數已用完，無法使用自動拼圖！"); return; }
        if (!leftPreview.src || !rightPreview.src) return alert('請上傳兩張照片');
        if (isSameImage()) { alert('⚠️ 左右是同一張像片，無法拼圖！'); return; }
        leftSplitImg.src  = leftPreview.src;
        rightSplitImg.src = rightPreview.src;
        captureTarget.style.display = 'block';
        comparePlaceholder.style.display = 'none';
        leftText.textContent  = '';
        rightText.textContent = '';
        initControls();
    }

    function resetZoom() {
        if (!userPermission.allow) { alert("❌ 次數已用完，無法使用！"); return; }
        resetZoomState();
    }

    function addTextLeft(t) {
        if (captureTarget.style.display === 'none') return alert('請先產生拼圖');
        leftText.textContent = t;
    }
    function addTextRight(t) {
        if (captureTarget.style.display === 'none') return alert('請先產生拼圖');
        rightText.textContent = t;
    }
    function clearLeftText()  { leftText.textContent  = ''; }
    function clearRightText() { rightText.textContent = ''; }

    function getTaiwanDate() {
        const now = new Date();
        const y = now.getFullYear() - 1911;
        const m = String(now.getMonth()+1).padStart(2,'0');
        const d = String(now.getDate()).padStart(2,'0');
        return `${y}/${m}/${d}`;
    }

    /* ══════════════════════════════════════
       縮放 / 拖曳控制
    ══════════════════════════════════════ */
    const zoomState = {
        left:  { scale:1, offsetX:0, offsetY:0, isDragging:false, startDistance:0 },
        right: { scale:1, offsetX:0, offsetY:0, isDragging:false, startDistance:0 }
    };

    function resetZoomState() {
        zoomState.left  = { scale:1, offsetX:0, offsetY:0, isDragging:false, startDistance:0 };
        zoomState.right = { scale:1, offsetX:0, offsetY:0, isDragging:false, startDistance:0 };
        update();
    }

    function initControls() {
        resetZoomState();
        leftImgArea.addEventListener('wheel',  e => { e.preventDefault(); zoomWheel(e,'left');  }, { passive:false });
        rightImgArea.addEventListener('wheel', e => { e.preventDefault(); zoomWheel(e,'right'); }, { passive:false });
        leftImgArea.addEventListener('touchstart', dragStart);
        leftImgArea.addEventListener('touchmove',  dragMove);
        leftImgArea.addEventListener('touchend',   dragEnd);
        rightImgArea.addEventListener('touchstart', dragStart);
        rightImgArea.addEventListener('touchmove',  dragMove);
        rightImgArea.addEventListener('touchend',   dragEnd);
        document.addEventListener('mouseup', dragEnd);
    }

    function dragStart(e) {
        e.preventDefault();
        const isLeft = e.target.closest('#leftImgArea');
        const a = isLeft ? 'left' : 'right';
        const rect = (isLeft ? leftImgArea : rightImgArea).getBoundingClientRect();
        if (e.touches && e.touches.length === 2) {
            const [t1, t2] = e.touches;
            zoomState[a].startDistance = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
            zoomState[a].isDragging = false;
        } else if (e.touches && e.touches.length === 1) {
            const t = e.touches[0];
            zoomState[a].isDragging = true;
            zoomState[a].startX = t.clientX - rect.left - zoomState[a].offsetX;
            zoomState[a].startY = t.clientY - rect.top  - zoomState[a].offsetY;
        }
    }

    function dragMove(e) {
        e.preventDefault();
        const isLeft = e.target.closest('#leftImgArea');
        const a = isLeft ? 'left' : 'right';
        const rect = (isLeft ? leftImgArea : rightImgArea).getBoundingClientRect();
        if (e.touches && e.touches.length === 2) {
            const [t1, t2] = e.touches;
            const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
            zoomState[a].scale = Math.min(4, Math.max(0.8, zoomState[a].scale * (dist / zoomState[a].startDistance)));
            zoomState[a].startDistance = dist;
            update();
        } else if (e.touches && e.touches.length === 1 && zoomState[a].isDragging) {
            const t = e.touches[0];
            zoomState[a].offsetX = t.clientX - rect.left - zoomState[a].startX;
            zoomState[a].offsetY = t.clientY - rect.top  - zoomState[a].startY;
            update();
        }
    }

    function dragEnd() {
        zoomState.left.isDragging = false;
        zoomState.right.isDragging = false;
    }

    function zoomWheel(e, a) {
        const delta = e.deltaY > 0 ? -0.08 : 0.08;
        zoomState[a].scale = Math.min(4, Math.max(0.8, zoomState[a].scale + delta));
        update();
    }

    function update() {
        leftSplitImg.style.transform  = `translate(-50%,-50%) translate(${zoomState.left.offsetX}px,${zoomState.left.offsetY}px) scale(${zoomState.left.scale})`;
        rightSplitImg.style.transform = `translate(-50%,-50%) translate(${zoomState.right.offsetX}px,${zoomState.right.offsetY}px) scale(${zoomState.right.scale})`;
    }

    /* ══════════════════════════════════════
       Loading 浮窗
    ══════════════════════════════════════ */
    function showLoading() { loadingOverlay.classList.add('show'); }
    function hideLoading()  { loadingOverlay.classList.remove('show'); isAnalyzing = false; }
    function closeLoading() {
        if (abortController) abortController.abort();
        hideLoading();
        analyzeBtn.disabled = !userPermission.allow;
        aiResultEl.innerHTML = '<span style="color:var(--yellow)">⚠️ 已手動停止 AI 分析</span>';
    }

    /* ══════════════════════════════════════
       AI 分析
    ══════════════════════════════════════ */
    async function analyzeBoth() {
        if (!userPermission.allow) { alert("❌ 次數已用完，無法使用AI分析！"); return; }
        if (captureTarget.style.display === 'none') { alert('請先產生拼圖'); return; }
        if (isSameImage()) { alert('⚠️ 這是同一張像片，AI不點評！'); return; }
        if (isAnalyzing) { alert('AI正在分析中，請勿重複點擊'); return; }

        isAnalyzing = true;
        analyzeBtn.disabled = true;
        aiResultEl.innerHTML = '<span style="color:var(--text-dim);letter-spacing:2px;font-size:10px;">▸ AI 分析中...</span>';
        abortController = new AbortController();
        showLoading();

        try {
            const imageData = await capture();
            const res = await fetch(GAS_URL, {
                method: 'POST',
                signal: abortController.signal,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ action:"analyze", image:imageData, lineId, lineName })
            });
            const data = await res.json();
            const result = data.result || "左圖：圖片分析失敗，請重新嘗試｜右圖：右圖評語";
            const [leftResult, rightResult] = result.split("｜");

            aiResultEl.innerHTML = `
<div class="ai-block left">
  <div class="ai-block-title">▸ 左圖 ／ 狀態評語</div>
  ${(leftResult || "").replace("左圖：","").trim() || "分析失敗，請重新嘗試"}
</div>
<div class="ai-divider"></div>
<div class="ai-block right">
  <div class="ai-block-title">▸ 右圖 ／ 狀態評語</div>
  ${(rightResult || "").replace("右圖：","").trim() || "右圖評語"}
</div>`;

            await fetchUserPermission();

        } catch (error) {
            if (error.name !== 'AbortError') {
                aiResultEl.innerHTML = `
<div class="ai-block left">
  <div class="ai-block-title">▸ 左圖 ／ 狀態評語</div>
  分析失敗，請重新嘗試
</div>
<div class="ai-divider"></div>
<div class="ai-block right">
  <div class="ai-block-title">▸ 右圖 ／ 狀態評語</div>
  右圖評語
</div>`;
                analyzeBtn.disabled = !userPermission.allow;
            }
        } finally {
            hideLoading();
        }
    }

    /* ══════════════════════════════════════
       截圖
    ══════════════════════════════════════ */
    async function capture() {
        const c = await html2canvas(captureTarget, { scale:2, useCORS:true, backgroundColor:'#1a2030' });
        return c.toDataURL('image/png');
    }

    /* ══════════════════════════════════════
       分享功能
    ══════════════════════════════════════ */
    async function shareOnlyImage() {
        if (!userPermission.allow) { alert("❌ 次數已用完，無法使用分享！"); return; }
        if (captureTarget.style.display === 'none') return alert('請先產生拼圖');

        fetch(GAS_URL, {
            method: "POST",
            body: new URLSearchParams({ action:"log_share_image", lineId, lineName })
        });

        const url = await capture();
        const blob = await fetch(url).then(r => r.blob());
        const file = new File([blob], '拼圖結果.png', { type:'image/png' });
        if (navigator.share) {
            await navigator.share({ files:[file] });
        } else {
            alert('❌ 裝置不支援分享功能');
        }
    }

    async function shareMergeWithAI() {
        if (!userPermission.allow) { alert("❌ 次數已用完，無法使用分享！"); return; }
        if (captureTarget.style.display === 'none') return alert('請先產生拼圖');
        if (aiResultEl.innerText.includes('尚未') || aiResultEl.innerText.includes('分析中')) {
            alert('請先執行AI點評分析'); return;
        }

        fetch(GAS_URL, {
            method: "POST",
            body: new URLSearchParams({ action:"log_share_ai", lineId, lineName })
        });

        const mergeContainer = document.createElement('div');
        mergeContainer.id = 'merge-container';
        mergeContainer.style.cssText = 'width:100%;background:#1a2030;padding:16px;font-family:Courier New,monospace;';

        mergeContainer.appendChild(captureTarget.cloneNode(true));

        const watermark = document.createElement('div');
        watermark.textContent = '彥彬 🧩 拼圖系統';
        watermark.style.cssText = 'text-align:center;padding:10px 0;font-size:12px;font-weight:700;color:#4fc3f7;letter-spacing:3px;border-top:1px solid #2a4a6e;margin-top:10px;';
        mergeContainer.appendChild(watermark);

        const aiClone = aiResultEl.cloneNode(true);
        aiClone.style.cssText = 'margin-top:10px;background:#0d1117;padding:12px;border:1px solid #2a4a6e;font-size:11px;color:#c8d8e8;';
        mergeContainer.appendChild(aiClone);
        document.body.appendChild(mergeContainer);

        try {
            const canvas = await html2canvas(mergeContainer, { scale:2, useCORS:true, backgroundColor:'#1a2030' });
            const url = canvas.toDataURL('image/png');
            const blob = await fetch(url).then(r => r.blob());
            const file = new File([blob], '拼圖+AI點評.png', { type:'image/png' });
            if (navigator.share) {
                await navigator.share({ files:[file] });
            } else {
                alert('❌ 裝置不支援分享功能');
            }
        } finally {
            document.body.removeChild(mergeContainer);
        }
    }

    /* ══════════════════════════════════════
       清除全部
    ══════════════════════════════════════ */
    function clearAll() {
        analyzeBtn.disabled = !userPermission.allow;
        location.reload();
    }

    /* ══════════════════════════════════════
       啟動
    ══════════════════════════════════════ */
    window.onload = function() { initLiff(); };
</script>
