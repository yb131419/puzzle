// 🔥 计算剩余天数/小时（修复当日到期显示错误）
// ==============================================
function getRemainingDays(expireDateStr) {
    try {
        if (!expireDateStr) return { days: 0, isExpired: true, isSameDay: false };
        const formatDate = expireDateStr.replace(/-/g, "/");
        const expireDate = new Date(formatDate);
        const today = new Date();
        
        today.setHours(0, 0, 0, 0);
        expireDate.setHours(0, 0, 0, 0);
        
        if (isNaN(expireDate.getTime())) return { days: 0, isExpired: true, isSameDay: false };
        
        const diffMs = expireDate - today;
        const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
        
        // 判斷：已過期 / 當天到期 / 剩餘天數
        const isExpired = diffMs < 0;
        const isSameDay = diffMs === 0;
        
        return {
            days: diffDays > 0 ? diffDays : 0,
            isExpired: isExpired,
            isSameDay: isSameDay
        };
    } catch (e) {
        return { days: 0, isExpired: true, isSameDay: false };
    }
}

    // ==============================================
    // 🔥 LINE LIFF 官方登录 + 獲取權限
    // ==============================================
    let lineId = "未登入";
    let lineName = "未登入";
    const LIFF_ID = "2007475335-p9Ah3X8Z"; 

    // 初始化 LIFF
    async function initLiff() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        lineId = profile.userId;
        lineName = profile.displayName;
        userNameEl.textContent = lineName;
        console.log("LIFF 登录成功：", lineId, lineName);
        await fetchUserPermission();
      } catch (err) {
        console.error("LIFF 初始化失败：", err);
        userNameEl.textContent = "登入失敗";
        disableAllFunction();
      }
    }

    // ==============================================
    // 🔥 獲取用戶權限
    // ==============================================
    async function fetchUserPermission() {
      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            action: "getPermission",
            lineId: lineId,
            lineName: lineName
          })
        });
        const data = await response.json();
        userPermission = data.permission || { allow: false, msg: "權限獲取失敗" };
        
        updatePermissionUI();
        toggleFunctionStatus();
        toggleSkoolRenewBtn(); // 控制续费按钮显示
        
      } catch (error) {
        console.error("獲取權限失敗：", error);
        userLevelEl.textContent = "獲取失敗";
        userRemainEl.textContent = "請重新整理";
        disableAllFunction();
      }
    }

    // ==============================================
    // 🔥 修复：权限UI（完美显示到期/次数）
    // ==============================================
    function updatePermissionUI() {
        const level = userPermission.level || "";
        const expireDate = userPermission.expireDate || "";
        const remainCount = userPermission.remainCount || 0;

        // 钻石会员
        if (level === "鑽石") {
            userLevelEl.textContent = "鑽石會員";
            userLevelEl.className = "text-diamond";
            userRemainEl.textContent = "永久使用權限";
            userRemainEl.className = "text-diamond";
        }
        
        // 尊爵会员
else if (level === "尊爵") {
    userLevelEl.textContent = "尊爵會員";
    userLevelEl.className = "text-vip";
    
    const expireResult = getRemainingDays(expireDate);
    const showDate = expireDate.replace(/-/g, "/");
    
    // 修复：当天到期不显示已过期
    if (expireResult.isExpired) {
        userRemainEl.textContent = `${showDate} (已到期)`;
    } else if (expireResult.isSameDay) {
        userRemainEl.textContent = `${showDate} (今日到期)`;
    } else {
        userRemainEl.textContent = `${showDate} (剩餘${expireResult.days}天)`;
    }
    userRemainEl.className = "text-vip";
}
        // 黄金会员
        else if (level === "黃金") {
            userLevelEl.textContent = "黃金會員";
            userLevelEl.className = "text-gold";
            userRemainEl.textContent = `剩餘次數：${remainCount} 次`;
            userRemainEl.className = "text-gold";
        }
        // 无权限
        else {
            userLevelEl.textContent = "權限已到期";
            userLevelEl.className = "text-expire";
            userRemainEl.textContent = "請聯繫管理員";
            userRemainEl.className = "text-expire";
        }
    }

    // ==============================================
    // 🔥 新增：控制Skool續費按鈕顯示（钻石会员隐藏）
    // ==============================================
    function toggleSkoolRenewBtn() {
        const level = userPermission.level || "";
        // 仅钻石会员不显示续费按钮，其他等级均显示
        if (level === "鑽石") {
            skoolRenewSection.classList.add('hidden');
        } else {
            skoolRenewSection.classList.remove('hidden');
        }
    }

    // ==============================================
    // 🔥 新增：Skool付費續費功能
    // ==============================================
    async function skoolRenew(days) {
        if (lineId === "未登入") {
            alert("❌ 請先登入LINE！");
            return;
        }
        showLoading();
        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    action: "skoolRenew",
                    lineId: lineId,
                    lineName: lineName,
                    days: days
                })
            });
            const data = await response.json();
            if (data.success) {
                alert(`✅ ${data.msg}\n🎉 續費${days}天成功！`);
                await fetchUserPermission(); // 续费成功后刷新权限
            } else {
                alert(`❌ ${data.msg}`);
            }
        } catch (error) {
            console.error("續費失敗：", error);
            alert("❌ 網路異常，續費失敗！");
        } finally {
            hideLoading();
        }
    }

    // ==============================================
    // 🔥 權限控制按鈕狀態
    // ==============================================
    function toggleFunctionStatus() {
      if (userPermission.allow) {
        mergeBtn.disabled = false;
        resetBtn.disabled = false;
        analyzeBtn.disabled = false;
        shareImgBtn.disabled = false;
        shareAiBtn.disabled = false;
      } else {
        disableAllFunction();
      }
    }

    // 禁用所有核心功能
    function disableAllFunction() {
      mergeBtn.disabled = true;
      resetBtn.disabled = true;
      analyzeBtn.disabled = true;
      shareImgBtn.disabled = true;
      shareAiBtn.disabled = true;
    }

    let abortController = null;
    let isAnalyzing = false;

    function isSameImage() {
        if (!leftFileInfo || !rightFileInfo) return false;
        return leftFileInfo.name === rightFileInfo.name && leftFileInfo.size === rightFileInfo.size;
    }

    function showLoading() {
        loadingOverlay.classList.add('show');
    }

    function hideLoading() {
        loadingOverlay.classList.remove('show');
        isAnalyzing = false;
    }

    function closeLoading() {
        if (abortController) {
            abortController.abort();
        }
        hideLoading();
        analyzeBtn.disabled = !userPermission.allow;
        aiResultEl.innerHTML = "⚠️ 已手動停止AI分析";
    }

    async function analyzeBoth() {
        if (!userPermission.allow) {
            alert("❌ 權限已到期，無法使用AI分析！");
            return;
        }
        if (!captureTarget.style.display) {
            alert('請先產生拼圖');
            return;
        }
        if (isSameImage()) {
            alert('⚠️ 這是同一張相片，AI不點評！');
            return;
        }
        if (isAnalyzing) {
            alert('AI正在分析中，請勿重複點擊');
            return;
        }

        isAnalyzing = true;
        analyzeBtn.disabled = true;
        aiResultEl.innerHTML = "";
        abortController = new AbortController();
        
        showLoading();

        try {
            const imageData = await capture();
            const response = await fetch(GAS_URL, {
                method: 'POST',
                signal: abortController.signal,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    action: "analyze",
                    image: imageData,
                    lineId: lineId,
                    lineName: lineName
                })
            });

            const data = await response.json();
            const result = data.result || "左圖：圖片分析失敗，請重新嘗試｜右圖：右圖評語";
            
            aiResultEl.innerHTML = `
<div class="ai-box ai-left">
  <div class="ai-title">📸 左圖 狀態評語</div>
  ${result.split("｜")[0]?.replace("左圖：", "").trim() || "圖片分析失敗，請重新嘗試"}
</div>
<div class="ai-split"></div>
<div class="ai-box ai-right">
  <div class="ai-title">📸 右圖 狀態評語</div>
  ${result.split("｜")[1]?.replace("右圖：", "").trim() || "右圖評語"}
</div>
            `;

            analyzeBtn.disabled = true;

        } catch (error) {
            if (error.name !== 'AbortError') {
                aiResultEl.innerHTML = `
<div class="ai-box ai-left">
  <div class="ai-title">📸 左圖 狀態評語</div>
  圖片分析失敗，請重新嘗試
</div>
<div class="ai-split"></div>
<div class="ai-box ai-right">
  <div class="ai-title">📸 右圖 狀態評語</div>
  右圖評語
</div>
                `;
                analyzeBtn.disabled = !userPermission.allow;
            }
        } finally {
            hideLoading();
        }
    }

    function getTaiwanDate() {
        const now = new Date();
        const y = now.getFullYear() - 1911;
        const m = String(now.getMonth()+1).padStart(2,'0');
        const d = String(now.getDate()).padStart(2,'0');
        return `${y}/${m}/${d}`;
    }

    document.getElementById('leftImg').addEventListener('change', e=>{
        const f = e.target.files[0];
        if(!f) return;
        leftFileInfo = { name: f.name, size: f.size };
        leftPreview.src = URL.createObjectURL(f);
        leftPreview.classList.remove('hidden');
    });

    document.getElementById('rightImg').addEventListener('change', e=>{
        const f = e.target.files[0];
        if(!f) return;
        rightFileInfo = { name: f.name, size: f.size };
        rightPreview.src = URL.createObjectURL(f);
        rightPreview.classList.remove('hidden');
    });

    function mergeImages() {
        if (!userPermission.allow) {
            alert("❌ 權限已到期，無法使用自動拼圖！");
            return;
        }
        if(!leftPreview.src || !rightPreview.src) return alert('請上傳兩張照片');
        if (isSameImage()) {
            alert('⚠️ 左右是同一張相片，無法拼圖！');
            return;
        }
        leftSplitImg.src = leftPreview.src;
        rightSplitImg.src = rightPreview.src;
        captureTarget.style.display = 'block';
        leftText.textContent = '';
        rightText.textContent = '';
        initControls();
    }

    function resetZoom() {
        if (!userPermission.allow) {
            alert("❌ 權限已到期，無法使用！");
            return;
        }
        resetZoomState();
    }

    function addTextLeft(t) {
        if(!captureTarget.style.display) return alert('請先產生拼圖');
        leftText.textContent = t;
    }
    function addTextRight(t) {
        if(!captureTarget.style.display) return alert('請先產生拼圖');
        rightText.textContent = t;
    }
    function clearLeftText() {
        leftText.textContent = '';
    }
    function clearRightText() {
        rightText.textContent = '';
    }

    const zoomState = {
        left: { scale:1, offsetX:0, offsetY:0, isDragging:false, startDistance:0 },
        right: { scale:1, offsetX:0, offsetY:0, isDragging:false, startDistance:0 }
    };

    function resetZoomState() {
        zoomState.left = {scale:1, offsetX:0, offsetY:0, isDragging:false, startDistance:0};
        zoomState.right = {scale:1, offsetX:0, offsetY:0, isDragging:false, startDistance:0};
        update();
    }

    function initControls() {
        resetZoomState();
        leftImgArea.addEventListener('wheel', (e)=>{e.preventDefault(); zoomWheel(e,'left');}, {passive:false});
        rightImgArea.addEventListener('wheel', (e)=>{e.preventDefault(); zoomWheel(e,'right');}, {passive:false});
        leftImgArea.addEventListener('touchstart', dragStart);
        leftImgArea.addEventListener('touchmove', dragMove);
        leftImgArea.addEventListener('touchend', dragEnd);
        rightImgArea.addEventListener('touchstart', dragStart);
        rightImgArea.addEventListener('touchmove', dragMove);
        rightImgArea.addEventListener('touchend', dragEnd);
        document.addEventListener('mouseup', dragEnd);
    }

    function dragStart(e) {
        e.preventDefault();
        const isLeft = e.target.closest('#leftImgArea');
        const a = isLeft ? 'left' : 'right';
        const rect = isLeft ? leftImgArea.getBoundingClientRect() : rightImgArea.getBoundingClientRect();
        
        if(e.touches && e.touches.length === 2) {
            const t1 = e.touches[0];
            const t2 = e.touches[1];
            const xDiff = t2.clientX - t1.clientX;
            const yDiff = t2.clientY - t1.clientY;
            zoomState[a].startDistance = Math.hypot(xDiff, yDiff);
            zoomState[a].isDragging = false;
        } else if(e.touches && e.touches.length === 1) {
            const t = e.touches[0];
            zoomState[a].isDragging = true;
            zoomState[a].startX = t.clientX - rect.left - zoomState[a].offsetX;
            zoomState[a].startY = t.clientY - rect.top - zoomState[a].offsetY;
        }
    }

    function dragMove(e) {
        e.preventDefault();
        const isLeft = e.target.closest('#leftImgArea');
        const a = isLeft ? 'left' : 'right';
        const rect = isLeft ? leftImgArea.getBoundingClientRect() : rightImgArea.getBoundingClientRect();

        if(e.touches && e.touches.length === 2) {
            const t1 = e.touches[0];
            const t2 = e.touches[1];
            const xDiff = t2.clientX - t1.clientX;
            const yDiff = t2.clientY - t1.clientY;
            const currentDistance = Math.hypot(xDiff, yDiff);
            const scale = currentDistance / zoomState[a].startDistance;
            zoomState[a].scale = Math.min(4, Math.max(0.8, zoomState[a].scale * scale));
            zoomState[a].startDistance = currentDistance;
            update();
        } else if(e.touches && e.touches.length === 1 && zoomState[a].isDragging) {
            const t = e.touches[0];
            zoomState[a].offsetX = t.clientX - rect.left - zoomState[a].startX;
            zoomState[a].offsetY = t.clientY - rect.top - zoomState[a].startY;
            update();
        }
    }

    function dragEnd(e) {
        zoomState.left.isDragging = false;
        zoomState.right.isDragging = false;
    }

    function zoomWheel(e, a) {
        const delta = e.deltaY > 0 ? -0.08 : 0.08;
        zoomState[a].scale = Math.min(4, Math.max(0.8, zoomState[a].scale + delta));
        update();
    }

    function update() {
        leftSplitImg.style.transform = `translate(-50%,-50%) translate(${zoomState.left.offsetX}px,${zoomState.left.offsetY}px) scale(${zoomState.left.scale})`;
        rightSplitImg.style.transform = `translate(-50%,-50%) translate(${zoomState.right.offsetX}px,${zoomState.right.offsetY}px) scale(${zoomState.right.scale})`;
    }

    async function capture() {
        const c = await html2canvas(captureTarget,{scale:2,useCORS:true,backgroundColor:'#fff'});
        return c.toDataURL('image/png');
    }

    // 分享拼圖
async function shareOnlyImage() {
    if (!userPermission.allow) {
        alert("❌ 權限已到期，無法使用分享！");
        return;
    }
    if(!captureTarget.style.display) return alert('請先產生拼圖');
    
    fetch(GAS_URL, {
        method: "POST",
        body: new URLSearchParams({ 
            action: "log_share_image",
            lineId: lineId,
            lineName: lineName
        })
    });

    const watermark = document.createElement('div');
    watermark.className = 'share-watermark';
    watermark.textContent = '彥彬 🧩拼圖系統';
    captureTarget.appendChild(watermark);

    const url = await capture();
    captureTarget.removeChild(watermark);

    const blob = await fetch(url).then(r=>r.blob());
    const file = new File([blob],'拼圖結果.png',{type:'image/png'});
    if(navigator.share) {
        await navigator.share({files:[file]});
    } else {
        alert('❌ 裝置不支援分享');
    }
}

// 分享拼圖+AI（水印位置彻底修复 + 图片强制加宽）
async function shareMergeWithAI() {
    if (!userPermission.allow) {
        alert("❌ 權限已到期，無法使用分享！");
        return;
    }
    if(!captureTarget.style.display) return alert('請先產生拼圖');
    if(aiResultEl.innerText.includes('尚未分析') || aiResultEl.innerText.includes('分析中')) {
        alert('請先執行AI點評分析');
        return;
    }
    
    fetch(GAS_URL, {
        method: "POST",
        body: new URLSearchParams({ 
            action: "log_share_ai",
            lineId: lineId,
            lineName: lineName
        })
    });

    const mergeContainer = document.createElement('div');
    mergeContainer.id = 'merge-container';
    // 🔥 固定加宽分享画布
    mergeContainer.style.width = '700px';
    mergeContainer.style.maxWidth = '90vw';
    mergeContainer.style.margin = '0 auto';
    mergeContainer.style.boxSizing = 'border-box';

    // 🔥 核心修复：克隆拼图区域，并强制铺满宽度（解决没加宽问题）
    const cloneTarget = captureTarget.cloneNode(true);
    cloneTarget.style.width = '100%';
    cloneTarget.style.maxWidth = 'none';
    cloneTarget.style.display = 'block';
    mergeContainer.appendChild(cloneTarget);
    
    // 水印样式
    const watermark = document.createElement('div');
    watermark.textContent = '彥彬 🧩拼圖系統';
    watermark.style.textAlign = 'center';
    watermark.style.padding = '8px 0';
    watermark.style.fontSize = '13px';
    watermark.style.fontWeight = '700';
    watermark.style.color = '#ffffff';
    watermark.style.textShadow = '1px 1px 2px #000, -1px -1px 2px #000, 1px -1px 2px #000, -1px 1px 2px #000';
    
    // 空白间距
    const space = document.createElement('div');
    space.style.height = '8px';
    
    // 拼接内容
    mergeContainer.appendChild(space);
    mergeContainer.appendChild(watermark);
    mergeContainer.appendChild(space);
    
    const aiClone = aiResultEl.cloneNode(true);
    aiClone.style.marginTop = '0';
    mergeContainer.appendChild(aiClone);
    document.body.appendChild(mergeContainer);

    try {
        const canvas = await html2canvas(mergeContainer, {
            scale: 2,
            useCORS: true,
            backgroundColor: '#ffffff'
        });
        const url = canvas.toDataURL('image/png');
        
        const blob = await fetch(url).then(r=>r.blob());
        const file = new File([blob],'拼圖+AI點評.png',{type:'image/png'});
        if(navigator.share) {
            await navigator.share({files:[file]});
        } else {
            alert('❌ 裝置不支援分享');
        }
    } finally {
        document.body.removeChild(mergeContainer);
    }
}

        analyzeBtn.disabled = !userPermission.allow;
        location.reload();
    }

    // 页面加载时初始化 LIFF
    window.onload = function() {
      initLiff();
    };
